name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run contract 01 tests
        run: |
          pytest -v \
            tests/test_products.py::test_create_product_returns_201_with_created_status \
            tests/test_products.py::test_seller_id_taken_from_jwt \
            tests/test_products.py::test_missing_images_returns_400 \
            tests/test_products.py::test_missing_category_returns_400 \
            tests/test_products.py::test_invalid_category_id_returns_400

      - name: Run contract 02 tests
        run: |
          pytest -v \
            tests/test_skus.py::test_first_sku_transitions_product_to_on_moderation \
            tests/test_skus.py::test_first_sku_emits_created_event_to_moderation \
            tests/test_skus.py::test_second_sku_no_state_change \
            tests/test_skus.py::test_add_sku_to_hard_blocked_returns_403 \
            tests/test_skus.py::test_missing_image_returns_400

      - name: Run contract 03 tests
        run: |
          pytest -v \
            tests/test_edit.py::test_edit_moderated_product_returns_to_on_moderation \
            tests/test_edit.py::test_edit_blocked_product_returns_to_on_moderation \
            tests/test_edit.py::test_reserves_preserved_after_sku_edit \
            tests/test_edit.py::test_edit_hard_blocked_returns_403 \
            tests/test_edit.py::test_edit_others_product_returns_403

      - name: Run contract 05 tests
        run: |
          pytest -v \
            tests/test_view.py::test_get_moderated_product_returns_full_payload \
            tests/test_view.py::test_get_blocked_product_returns_blocking_reason_and_field_reports \
            tests/test_view.py::test_get_others_product_returns_404 \
            tests/test_view.py::test_get_nonexistent_returns_404

      - name: Run contract 07 tests
        run: |
          pytest -v \
            tests/test_catalog.py::test_catalog_returns_only_visible_products \
            tests/test_catalog.py::test_catalog_item_is_short_without_cost_fields \
            tests/test_catalog.py::test_batch_returns_only_visible_by_ids \
            tests/test_catalog.py::test_catalog_not_accessible_via_bearer_without_service_key

      - name: Run contract 08 tests
        run: |
          pytest -v \
            tests/test_reserve.py::test_reserve_all_skus_succeeds \
            tests/test_reserve.py::test_partial_insufficient_stock_returns_409_all_rollback \
            tests/test_reserve.py::test_idempotent_reserve_returns_200_without_double_deduction \
            tests/test_reserve.py::test_sku_out_of_stock_event_emitted \
            tests/test_reserve.py::test_unreserve_restores_quantities

      - name: Run contract 09 tests
        run: |
          pytest -v \
            tests/test_moderation_events.py::test_moderated_event_clears_blocking_data \
            tests/test_moderation_events.py::test_blocked_soft_saves_field_reports \
            tests/test_moderation_events.py::test_blocked_hard_sets_terminal_status \
            tests/test_moderation_events.py::test_hard_blocked_product_rejects_seller_edits \
            tests/test_moderation_events.py::test_duplicate_event_same_idempotency_key_no_side_effects \
            tests/test_moderation_events.py::test_missing_service_key_returns_401

      - name: Run full test suite
        run: pytest -v
